blueprint:
  name: Zigbee2MQTT - IKEA tradfri
  description: >-
    Blueprint for IKEA TRADFRI Shortcut Button (E1812) via Zigbee2MQTT.
    Supports single press, double press, long press, and release actions.
  domain: automation
  source_url: https://github.com/fapgomes/ha-blueprints/blob/main/zigbee2mqtt-ikea_tradfri.yaml
  input:
    mode:
      name: Automation Modes
      description: https://www.home-assistant.io/docs/automation/modes/
      default: single
      selector:
        select:
          mode: dropdown
          options:
            - single
            - restart
            - queued
            - parallel
    remote:
      name: tradfri button
      description: Button for IKEA tradfri 
      selector:
        entity:
          domain:
          - event
          multiple: true
    "on":
      name: Single Press
      description: Action to run on single press
      default: []
      selector:
        action: {}
    "off":
      name: Double Press
      description: Action to run on double press
      default: []
      selector:
        action: {}
    brightness_move_up:
      name: Long Press
      description: Action to run on long press (hold)
      default: []
      selector:
        action: {}
    brightness_stop:
      name: Release
      description: Action to run when button is released after long press
      default: []
      selector:
        action: {}
mode: !input mode
max_exceeded: silent
trigger:
  - platform: state
    entity_id: !input remote
    not_to:
      - unavailable
      - unknown
condition:
  - "{{ trigger.to_state.attributes.event_type | default('') != '' }}"
action:
  - variables:
      event_type: "{{ trigger.to_state.attributes.event_type }}"
  - choose:
      - conditions:
          - "{{ event_type == 'on' }}"
        sequence: !input "on"
      - conditions:
          - "{{ event_type == 'off' }}"
        sequence: !input "off"
      - conditions:
          - "{{ event_type == 'brightness_move_up' }}"
        sequence: !input brightness_move_up
      - conditions:
          - "{{ event_type == 'brightness_stop' }}"
        sequence: !input brightness_stop
    default:
      - action: logbook.log
        data:
          name: "Zigbee2MQTT - IKEA tradfri"
          message: "event_type=={{ event_type }}"
